<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSA Public Display</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --reg-red: #ff4d4d; 
            --upd-yellow: #f1c40f; 
            --footer-bg: #0b0f1a;
            --card-bg: #1e293b;
        }
        
        * { box-sizing: border-box; }

        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER - Responsive height */
        header { 
            padding: 15px 10px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px;
            background: rgba(0,0,0,0.2);
        }
        .logo { height: 60px; width: auto; } 
        .header-text h1 { margin: 0; font-size: clamp(18px, 4vw, 32px); font-weight: 900; }
        .header-text h2 { margin: 0; font-size: clamp(14px, 3vw, 22px); color: #f8fafc; text-align: center; }

        /* NOTICE BAR */
        .notice-bar {
            background: #000;
            white-space: nowrap;
            overflow: hidden;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .notice-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* MAIN DISPLAY AREA - Responsive Grid */
        .main-container { 
            flex: 1; 
            display: flex; 
            flex-wrap: wrap; /* Allows stacking on mobile */
            width: 100%;
        }
        .column { 
            flex: 1; 
            min-width: 300px; /* Forces stack on small screens */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .column:first-child { border-right: 1px solid rgba(255,255,255,0.05); }

        .dept-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin-bottom: 10px; }
        .now-serving { font-size: 1.2rem; color: #94a3b8; }
        .number { 
            font-size: clamp(8rem, 20vw, 15rem); 
            font-weight: 900; 
            margin: 10px 0; 
            line-height: 1; 
            text-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }
        .status-label { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 800; margin-bottom: 10px; }
        .proceed-text { font-size: 1.1rem; color: #cbd5e1; }
        .table-num { font-weight: 900; font-size: 1.5rem; color: white; }

        .reg-col .dept-title, .reg-col .number { color: var(--reg-red); }
        .upd-col .dept-title, .upd-col .number { color: var(--upd-yellow); }

        /* FOOTER - Responsive height */
        .footer-bar { 
            background: var(--footer-bg); 
            min-height: 150px; 
            display: flex; 
            flex-direction: row;
            align-items: center; 
            padding: 20px; 
            border-top: 3px solid #334155; 
        }

        .history-label { 
            font-size: 0.8rem; color: #64748b; font-weight: 800; 
            text-transform: uppercase; border-right: 2px solid #334155; 
            padding-right: 15px; margin-right: 15px;
        }
        
        .history-list { display: flex; gap: 15px; flex: 1; overflow: hidden; }

        .history-card { 
            background: #1e293b; 
            padding: 10px 15px; 
            border-radius: 8px; 
            flex: 0 0 180px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            animation: slideInBottom 0.5s ease-out forwards;
        }

        /* QR SECTION - Hidden on very small screens to save space */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-left: 15px;
            border-left: 2px solid #334155;
        }
        .qr-image { height: 80px; width: 80px; background: white; padding: 3px; border-radius: 4px; }
        .qr-subtext { font-size: 0.6rem; margin-top: 5px; text-align: center; }

        /* MOBILE OVERRIDES (Screens smaller than 768px) */
        @media (max-width: 768px) {
            .column:first-child { border-right: none; }
            .main-container { flex-direction: column; }
            .footer-bar { flex-direction: column; height: auto; gap: 20px; }
            .history-label { border-right: none; border-bottom: 2px solid #334155; padding-right: 0; padding-bottom: 10px; margin-right: 0; }
            .qr-container { border-left: none; border-top: 2px solid #334155; padding-left: 0; padding-top: 15px; margin-left: 0; width: 100%; }
            body { overflow-y: auto; } /* Allow scrolling on mobile */
        }

        .flash { animation: highlight 0.8s ease-in-out 3; }
        @keyframes highlight { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <header>
        <img src="PSALOGO.png" alt="PSA Logo" class="logo">
        <div class="header-text">
            <h1>PSA QUEUE</h1>
            <h2>NEGROS OCCIDENTAL</h2>
        </div>
    </header>

    <div class="notice-bar">
        <div class="notice-content">
            <span class="notice-text">
                <span class="notice-red">NOTICE:</span> <span class="notice-white">ONE NUMBER, ONE TRANSACTION</span>
            </span>
        </div>
    </div>

    <div class="main-container">
        <div class="column reg-col">
            <div class="dept-title">REGISTRATION</div>
            <div class="now-serving">NOW SERVING</div>
            <div id="num-REGISTRATION" class="number">---</div>
            <div id="type-REGISTRATION" class="status-label">VACANT</div>
            <div class="proceed-text">PROCEED TO TABLE # <span id="table-REGISTRATION" class="table-num">0</span></div>
        </div>

        <div class="column upd-col">
            <div class="dept-title">UPDATING</div>
            <div class="now-serving">NOW SERVING</div>
            <div id="num-UPDATING" class="number">---</div>
            <div id="type-UPDATING" class="status-label">VACANT</div>
            <div class="proceed-text">PROCEED TO TABLE # <span id="table-UPDATING" class="table-num">0</span></div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="history-label">PREVIOUSLY<br>CALLED</div>
        <div id="historyList" class="history-list"></div>
        <div class="qr-container">
            <img src="qrdisplay.png" alt="QR" class="qr-image">
            <div class="qr-subtext">VIEW LIVE</div>
        </div>
    </div>

    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    // [Keep your existing Firebase and Logic script here exactly as it was]
    // The logic remains the same, only the CSS above was changed to handle responsiveness.
</script>
</body>
</html>
