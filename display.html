<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PSA Public Display - Cloud Sync</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg-dark: #243447; --reg-red: #e53e3e; --upd-yellow: #ecc94b; --pri-blue: #4299e1; --footer-bg: #1a2a3a; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px 50px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .logo { width: 100px; }
        .header-text h1 { margin: 0; font-size: 32px; font-weight: 800; }
        .main-container { flex: 1; display: flex; justify-content: space-around; align-items: center; }
        .column { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .column:last-child { border-right: none; }
        .dept-title { font-size: 2.2rem; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; }
        .number { font-size: 9rem; font-weight: 900; margin: 10px 0; line-height: 1; }
        .status-label { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .reg-col .dept-title, .reg-col .number { color: var(--reg-red); }
        .upd-col .dept-title, .upd-col .number { color: var(--upd-yellow); }
        .pri-col .dept-title, .pri-col .number { color: var(--pri-blue); }
        .footer-bar { background: var(--footer-bg); height: 100px; display: flex; align-items: center; padding: 0 40px; border-top: 1px solid #334e68; }
        .history-list { display: flex; gap: 15px; }
        .history-item { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 6px; border-left: 4px solid #fff; animation: slideIn 0.5s; }
        .flash { animation: highlight 1s ease-in-out 3; }
        @keyframes highlight { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; } }
    </style>
</head>
<body>
    <header>
        <img src="PSALOGO.png" alt="" class="logo">
        <div class="header-text"><h1>PHILIPPINE STATISTICS AUTHORITY</h1><h1>NEGROS OCCIDENTAL</h1></div>
    </header>
    <div class="main-container">
        <div class="column reg-col"><div class="dept-title">REGISTRATION</div><div id="num-REGISTRATION" class="number">---</div><div id="type-REGISTRATION" class="status-label">VACANT</div><div>TABLE # <span id="table-REGISTRATION">0</span></div></div>
        <div class="column upd-col"><div class="dept-title">UPDATING</div><div id="num-UPDATING" class="number">---</div><div id="type-UPDATING" class="status-label">VACANT</div><div>TABLE # <span id="table-UPDATING">0</span></div></div>
        <div class="column pri-col"><div class="dept-title">PRINTING</div><div id="num-PRINTING" class="number">---</div><div id="type-PRINTING" class="status-label">VACANT</div><div>TABLE # <span id="table-PRINTING">0</span></div></div>
    </div>
    <div class="footer-bar"><div id="historyList" class="history-list"></div></div>
    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const firebaseConfig = { databaseURL: "https://psa-queue-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const display = data.queue_display || {};
        const history = data.queue_history || [];
        const depts = ['REGISTRATION', 'UPDATING', 'PRINTING'];

        depts.forEach(dept => {
            const numEl = document.getElementById(`num-${dept}`);
            const typeEl = document.getElementById(`type-${dept}`);
            const tableEl = document.getElementById(`table-${dept}`);

            if (display[dept]) {
                const newNum = "#" + display[dept].num;
                if (numEl.innerText !== newNum) {
                    numEl.innerText = newNum;
                    typeEl.innerText = display[dept].type;
                    tableEl.innerText = display[dept].table;
                    document.getElementById('ding').play().catch(() => {});
                    numEl.classList.remove('flash'); void numEl.offsetWidth; numEl.classList.add('flash');
                }
            } else {
                numEl.innerText = "---"; typeEl.innerText = "VACANT"; tableEl.innerText = "0";
            }
        });

        document.getElementById('historyList').innerHTML = history.slice(0, 4).map(item => `
            <div class="history-item" style="border-left-color: ${item.dept==='REGISTRATION'?'#e53e3e':item.dept==='UPDATING'?'#ecc94b':'#4299e1'}">
                <b>#${item.num}</b> <small>(${item.dept})</small><br><small>Table #${item.table}</small>
            </div>`).join('');
    });
</script>
</body>
</html>
