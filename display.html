<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PSA Public Display - Cloud Sync</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --bg-dark: #1e2c3b; 
            --reg-red: #d94141; 
            --upd-yellow: #f1c40f; 
            --pri-blue: #3498db; 
            --footer-bg: #15202b; 
            --footer-card: #2c3e50;
        }
        
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Header Section - Centered PSA Branding */
        header { 
            padding: 30px 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 25px;
        }
        .logo { width: 120px; height: auto; }
        .header-text { text-align: left; }
        .header-text h1 { 
            margin: 0; 
            font-size: 42px; 
            font-weight: 800; 
            letter-spacing: 1px; 
        }
        .header-text h2 { 
            margin: 0; 
            font-size: 32px; 
            font-weight: 700; 
            letter-spacing: 1px; 
        }

        /* Main Display Columns */
        .main-container { 
            flex: 1; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding-bottom: 50px;
        }
        .column { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .column:last-child { border-right: none; }

        .dept-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        .serving-label { font-size: 1.6rem; font-weight: bold; margin-bottom: 10px; color: #cbd5e0; }
        
        /* The Numbers */
        .number { font-size: 12rem; font-weight: 900; margin: 0; line-height: 1; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .status-label { font-size: 1.8rem; font-weight: bold; margin: 20px 0; letter-spacing: 2px; }
        .table-info { font-style: italic; font-size: 1.2rem; color: #cbd5e0; letter-spacing: 1px; }

        /* Column Specific Colors */
        .reg-col .dept-title, .reg-col .number { color: var(--reg-red); }
        .upd-col .dept-title, .upd-col .number { color: var(--upd-yellow); }
        .pri-col .dept-title, .pri-col .number { color: var(--pri-blue); }

        /* Footer / Previous Calls Section */
        .footer-bar { 
            background: var(--footer-bg); 
            height: 120px; 
            display: flex; 
            align-items: center; 
            padding: 0 40px; 
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .history-title { 
            font-size: 0.85rem; 
            color: #8899a6; 
            font-weight: bold;
            text-transform: uppercase; 
            border-right: 2px solid #3d444d; 
            padding-right: 25px; 
            margin-right: 25px;
            text-align: left;
            line-height: 1.4;
        }
        .history-list { display: flex; gap: 20px; }
        .history-item { 
            background: var(--footer-card); 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-size: 1rem; 
            border-left: 5px solid #fff; 
            animation: slideIn 0.5s ease-out;
            min-width: 180px;
            text-align: left;
        }
        .history-item b { font-size: 1.1rem; }
        .history-item small { color: #bdc3c7; }

        /* Animations */
        .flash { animation: highlight 1s ease-in-out 3; }
        @keyframes highlight { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <header>
        <img src="PSALOGO.png" alt="PSA Logo" class="logo">
        <div class="header-text">
            <h1>PHILIPPINE STATISTICS AUTHORITY</h1>
            <h2>NEGROS OCCIDENTAL</h2>
        </div>
    </header>

    <div class="main-container">
        <div class="column reg-col">
            <div class="dept-title">REGISTRATION</div>
            <div class="serving-label">NOW SERVING</div>
            <div id="num-REGISTRATION" class="number">---</div>
            <div id="type-REGISTRATION" class="status-label">VACANT</div>
            <div class="table-info">PLEASE PROCEED TO TABLE # <span id="table-REGISTRATION">0</span></div>
        </div>

        <div class="column upd-col">
            <div class="dept-title">UPDATING</div>
            <div class="serving-label">NOW SERVING</div>
            <div id="num-UPDATING" class="number">---</div>
            <div id="type-UPDATING" class="status-label">VACANT</div>
            <div class="table-info">PLEASE PROCEED TO TABLE # <span id="table-UPDATING">0</span></div>
        </div>

        <div class="column pri-col">
            <div class="dept-title">PRINTING</div>
            <div class="serving-label">NOW SERVING</div>
            <div id="num-PRINTING" class="number">---</div>
            <div id="type-PRINTING" class="status-label">VACANT</div>
            <div class="table-info">PLEASE PROCEED TO TABLE # <span id="table-PRINTING">0</span></div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="history-title">PREVIOUS CALLS<br>(WAITING/NO-SHOW)</div>
        <div id="historyList" class="history-list">
            </div>
    </div>

    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    // --- 1. FIREBASE CONFIG ---
    const firebaseConfig = { databaseURL: "https://psa-queue-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. LISTEN FOR CLOUD UPDATES ---
    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const display = data.queue_display || {};
        const history = data.queue_history || [];
        const depts = ['REGISTRATION', 'UPDATING', 'PRINTING'];

        depts.forEach(dept => {
            const numEl = document.getElementById(`num-${dept}`);
            const typeEl = document.getElementById(`type-${dept}`);
            const tableEl = document.getElementById(`table-${dept}`);

            if (display[dept]) {
                const newNumText = "#" + display[dept].num;
                // Trigger notification if number changes
                if (numEl.innerText !== newNumText) {
                    numEl.innerText = newNumText;
                    typeEl.innerText = display[dept].type;
                    tableEl.innerText = display[dept].table;
                    
                    // Alert Sound
                    const audio = document.getElementById('ding');
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log("Audio blocked by browser."));
                    
                    // Visual Flash
                    numEl.classList.remove('flash');
                    void numEl.offsetWidth; // Trigger reflow for animation reset
                    numEl.classList.add('flash');
                }
            } else {
                // Return to Vacant state
                numEl.innerText = "---";
                typeEl.innerText = "VACANT";
                tableEl.innerText = "0";
            }
        });

        // --- 3. RENDER HISTORY (FOOTER) ---
        const histListEl = document.getElementById('historyList');
        // Show last 4 "Pending" tickets
        histListEl.innerHTML = history.slice(0, 4).map(item => `
            <div class="history-item" style="border-left-color: ${
                item.dept === 'REGISTRATION' ? 'var(--reg-red)' : 
                item.dept === 'UPDATING' ? 'var(--upd-yellow)' : 'var(--pri-blue)'
            }">
                <b>Ticket #${item.num}</b> <small>(${item.dept})</small><br>
                <small>Table #${item.table}</small>
            </div>
        `).join('');
    });
</script>
</body>
</html>
