<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PSA Public Display</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --reg-red: #ff4d4d; 
            --upd-yellow: #f1c40f; 
            --pri-blue: #3498db; 
            --footer-bg: #0b0f1a;
            --card-bg: #1e293b;
        }
        
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Header Section */
        header { 
            padding: 40px 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 30px;
            background: rgba(0,0,0,0.2);
        }
        .logo { width: 130px; height: auto; }
        .header-text h1 { 
            margin: 0; 
            font-size: 48px; 
            font-weight: 900; 
            letter-spacing: 2px; 
        }
        .header-text h2 { 
            margin: 0; 
            font-size: 36px; 
            font-weight: 700; 
            letter-spacing: 1px;
            color: #f8fafc;
            text-align: center;
        }

        /* Main Columns */
        .main-container { 
            flex: 1; 
            display: flex; 
            padding: 20px 0 60px 0;
        }
        .column { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center;
            border-right: 2px solid rgba(255,255,255,0.05);
        }
        .column:last-child { border-right: none; }

        .dept-title { font-size: 3rem; font-weight: 800; margin-bottom: 40px; letter-spacing: 3px; }
        .now-serving { font-size: 1.8rem; font-weight: 600; color: #94a3b8; margin-bottom: 10px; }
        
        /* The Big Numbers */
        .number { 
            font-size: 14rem; 
            font-weight: 900; 
            margin: -10px 0; 
            line-height: 1; 
            text-shadow: 0 15px 30px rgba(0,0,0,0.5); 
        }
        
        .status-label { font-size: 2rem; font-weight: 800; margin: 30px 0 10px 0; }
        .proceed-text { font-size: 1.4rem; font-weight: 400; color: #cbd5e1; }
        .table-num { font-weight: 900; font-size: 1.8rem; color: white; }

        /* Colors based on image */
        .reg-col .dept-title, .reg-col .number { color: var(--reg-red); }
        .upd-col .dept-title, .upd-col .number { color: var(--upd-yellow); }
        .pri-col .dept-title, .pri-col .number { color: var(--pri-blue); }

        /* Footer - Previous Calls */
        .footer-bar { 
            background: var(--footer-bg); 
            height: 140px; 
            display: flex; 
            align-items: center; 
            padding: 0 50px; 
            border-top: 3px solid #334155;
        }
        .history-label { 
            font-size: 1.1rem; 
            color: #64748b; 
            font-weight: 800;
            text-transform: uppercase; 
            border-right: 3px solid #334155; 
            padding-right: 30px; 
            margin-right: 30px;
            white-space: nowrap;
            line-height: 1.2;
        }
        .history-list { display: flex; gap: 25px; flex: 1; }
        .history-card { 
            background: var(--card-bg); 
            padding: 15px 25px; 
            border-radius: 12px; 
            min-width: 220px;
            border-left: 8px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .history-card b { font-size: 1.4rem; display: block; margin-bottom: 2px; }
        .history-card span { font-size: 0.9rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; }

        /* Animations */
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .flash { animation: highlight 0.8s ease-in-out 3; }
        @keyframes highlight { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <header>
        <img src="PSALOGO.png" alt="PSA Logo" class="logo">
        <div class="header-text">
            <h1>PHILIPPINE STATISTICS AUTHORITY</h1>
            <h2>NEGROS OCCIDENTAL</h2>
        </div>
    </header>

    <div class="main-container">
        <div class="column reg-col">
            <div class="dept-title">REGISTRATION</div>
            <div class="now-serving">NOW SERVING</div>
            <div id="num-REGISTRATION" class="number">---</div>
            <div id="type-REGISTRATION" class="status-label">VACANT</div>
            <div class="proceed-text">PLEASE PROCEED TO TABLE # <span id="table-REGISTRATION" class="table-num">0</span></div>
        </div>

        <div class="column upd-col">
            <div class="dept-title">UPDATING</div>
            <div class="now-serving">NOW SERVING</div>
            <div id="num-UPDATING" class="number">---</div>
            <div id="type-UPDATING" class="status-label">VACANT</div>
            <div class="proceed-text">PLEASE PROCEED TO TABLE # <span id="table-UPDATING" class="table-num">0</span></div>
        </div>

        <div class="column pri-col">
            <div class="dept-title">PRINTING</div>
            <div class="now-serving">NOW SERVING</div>
            <div id="num-PRINTING" class="number">---</div>
            <div id="type-PRINTING" class="status-label">VACANT</div>
            <div class="proceed-text">PLEASE PROCEED TO TABLE # <span id="table-PRINTING" class="table-num">0</span></div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="history-label">PREVIOUSLY CALLED<br>(WAITING/NO-SHOW)</div>
        <div id="historyList" class="history-list">
            </div>
    </div>

    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const firebaseConfig = { databaseURL: "https://psa-queue-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const display = data.queue_display || {};
        const history = data.queue_history || [];
        const depts = ['REGISTRATION', 'UPDATING', 'PRINTING'];

        depts.forEach(dept => {
            const numEl = document.getElementById(`num-${dept}`);
            const typeEl = document.getElementById(`type-${dept}`);
            const tableEl = document.getElementById(`table-${dept}`);

            if (display[dept]) {
                const newNum = "#" + display[dept].num;
                if (numEl.innerText !== newNum) {
                    numEl.innerText = newNum;
                    typeEl.innerText = display[dept].type;
                    tableEl.innerText = display[dept].table;
                    
                    // Voice/Sound notification
                    document.getElementById('ding').play().catch(() => {});
                    
                    // Flash effect
                    numEl.classList.remove('flash');
                    void numEl.offsetWidth;
                    numEl.classList.add('flash');
                }
            } else {
                numEl.innerText = "---";
                typeEl.innerText = "VACANT";
                tableEl.innerText = "0";
            }
        });

        // Previous Calls Rendering
        const histEl = document.getElementById('historyList');
        histEl.innerHTML = history.slice(0, 4).map(item => `
            <div class="history-card" style="border-left-color: ${
                item.dept === 'REGISTRATION' ? 'var(--reg-red)' : 
                item.dept === 'UPDATING' ? 'var(--upd-yellow)' : 'var(--pri-blue)'
            }">
                <span>${item.dept}</span>
                <b>Ticket #${item.num}</b>
                <small>Table #${item.table}</small>
            </div>
        `).join('');
    });
</script>
</body>
</html>
