<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PSA Admin - Negros Occidental</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --psa-blue: #1a4a7c; 
            --psa-light-blue: #3e6d9c; 
            --psa-bg: #808080; 
            --accent-teal: #11a9bc; 
            --panel-bg: #d1d9e2; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--psa-bg); margin: 0; padding: 0; color: #333; }
        
        /* Bigger Header */
        header { padding: 25px 10px; display: flex; align-items: center; justify-content: center; color: white; background: rgba(0,0,0,0.15); }
        .logo { width: 85px; margin-right: 20px; }
        .header-text h1 { margin: 0; font-size: 32px; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header-text p { margin: 0; font-size: 24px; text-align: center; font-weight: bold; }

        .management-bar { 
            background: #222; color: white; width: 95%; margin: 15px auto; 
            padding: 10px 25px; border-radius: 30px; display: flex; 
            justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .reset-btn { background: #8b1a1a; color: white; border: none; padding: 6px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .reset-btn:hover { background: #ff4d4d; }
        .logout-btn { background: #444; color: white; border: none; padding: 6px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-left: 10px; }

        .tabs-container { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .tab-link { 
            background: white; color: var(--psa-blue); border: none; padding: 12px 50px; 
            border-radius: 30px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tab-link.active { background: var(--psa-blue); color: white; transform: scale(1.05); }

        .dashboard-wrapper { display: flex; width: 98%; margin: 0 auto; gap: 20px; align-items: flex-start; }

        /* Left Side: Main Controls */
        .main-card { 
            background: white; flex: 2.2; border-radius: 25px; padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); min-height: 550px;
        }

        /* Right Side: History */
        .history-card { 
            background: white; flex: 1; border-radius: 25px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); min-height: 550px;
        }

        .dept-title { text-align: center; color: var(--psa-blue); font-size: 28px; font-weight: 800; margin-top: 0; margin-bottom: 15px; }
        
        /* Restore image_2c35e0.png Design */
        .serving-box { background: var(--panel-bg); border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 25px; }
        .serving-box small { color: var(--psa-blue); font-weight: 600; font-size: 18px; letter-spacing: 1px; }
        .serving-box h2 { color: var(--psa-blue); margin: 10px 0; font-size: 42px; font-weight: 900; }
        
        /* Pill Buttons */
        .pill-btn { 
            background: var(--accent-teal); color: white; border: none; 
            padding: 10px 30px; border-radius: 25px; cursor: pointer; 
            font-weight: 900; font-size: 18px; text-transform: uppercase; 
            transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .pill-btn:hover { background: #0e8c9c; transform: translateY(-2px); }

        .controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 25px; font-weight: bold; font-size: 16px; }
        .add-btn { color: white; border: none; padding: 12px 22px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .add-reg { background: var(--psa-blue); }
        .add-pri { background: #2c3e50; }

        .queues-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .queue-panel { background: var(--panel-bg); border-radius: 15px; padding: 15px; min-height: 300px; }
        
        /* Restore image_2c32a0.png Design */
        .queue-row { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; padding: 2px 5px; }
        .queue-row h3 { margin: 0; font-size: 19px; color: var(--psa-blue); font-weight: 900; }
        .serve-pill { font-size: 14px; padding: 6px 20px; }

        .not-catered-title { 
            color: #4a5568; font-size: 13px; font-weight: 800; margin-bottom: 12px; 
            text-transform: uppercase; border-bottom: 2px solid #ddd; padding-bottom: 5px;
        }
        .history-list-scroll { max-height: 520px; overflow-y: auto; }
        .history-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="bg-overlay" class="bg-image"></div>

    <header>
        <img src="PSALOGO.png" alt="" class="logo">
        <div class="header-text">
            <h1>PHILIPPINE STATISTICS AUTHORITY</h1>
            <p>NEGROS OCCIDENTAL</p>
        </div>
    </header>

    <div class="management-bar">
        <span style="letter-spacing: 1px; font-weight: bold; font-size: 14px;">HOSTESS MANAGEMENT</span>
        <div>
            <button class="reset-btn" onclick="resetQueue()">RESET QUEUE</button>
            <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
        </div>
    </div>

    <div class="tabs-container" id="tabs-nav"></div>

    <div class="dashboard-wrapper">
        <!-- Main Panel -->
        <div class="main-card">
            <div id="tab-container"></div>
        </div>

        <!-- Side Panel: History -->
        <div class="history-card">
            <div class="not-catered-title">PREVIOUSLY CALLED (PENDING / NO-SHOW)</div>
            <div id="global-history-list" class="history-list-scroll">
                <div style="color:#aaa; font-size:12px">No pending no-shows.</div>
            </div>
        </div>
    </div>

<script>
    // Security & Firebase Initialization (Same as before)
    const session = localStorage.getItem('psa_admin_session');
    const currentTime = new Date().getTime();
    if (!session || currentTime > session) {
        localStorage.removeItem('psa_admin_session');
        window.location.href = "login.html";
    }
    
    const firebaseConfig = { databaseURL: "https://psa-queue-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const depts = ['REGISTRATION', 'UPDATING'];
    let localQueues = { REGISTRATION: { REGULAR: [], PRIORITY: [] }, UPDATING: { REGULAR: [], PRIORITY: [] } };
    let isInitialized = false;

    function init() {
        document.getElementById('tabs-nav').innerHTML = depts.map((d, i) => 
            `<button class="tab-link ${i===0?'active':''}" onclick="openTab(event, '${d}')">${d}</button>`).join('');

        document.getElementById('tab-container').innerHTML = depts.map((dept, i) => `
            <div id="${dept}" class="tab-content ${i===0?'active':''}">
                <h1 class="dept-title">${dept}</h1>
                <div class="serving-box">
                    <small>CURRENTLY AT TABLE</small>
                    <h2 id="now-${dept}">NONE</h2>
                    <button class="pill-btn" onclick="markDone('${dept}')">MARK AS DONE</button>
                </div>
                <div class="controls">
                    <span>TABLE (1-5):</span>
                    <input type="number" id="table-${dept}" style="width:45px; padding:6px; border-radius:8px; border:1px solid #ccc" value="${dept==='REGISTRATION'?3:4}" min="1" max="5">
                    <button class="add-btn add-reg" onclick="addTicket('${dept}', 'REGULAR')">+REGULAR</button>
                    <button class="add-btn add-pri" onclick="addTicket('${dept}', 'PRIORITY')">+PRIORITY</button>
                </div>
                <div class="queues-grid">
                    <div class="queue-panel" id="list-${dept}-REGULAR"></div>
                    <div class="queue-panel" id="list-${dept}-PRIORITY"></div>
                </div>
            </div>
        `).join('');
        isInitialized = true;
    }

    db.ref('/').on('value', (snapshot) => {
        if (!isInitialized) return;
        const data = snapshot.val() || {};
        window.currentCounters = data.counters || { REGISTRATION: {REGULAR:1, PRIORITY:1}, UPDATING: {REGULAR:1, PRIORITY:1} };
        window.currentHistory = data.queue_history || [];
        window.currentDisplay = data.queue_display || {};
        localQueues = data.queues || { REGISTRATION: { REGULAR: [], PRIORITY: [] }, UPDATING: { REGULAR: [], PRIORITY: [] } };
        
        depts.forEach(d => {
            if (!localQueues[d]) localQueues[d] = { REGULAR: [], PRIORITY: [] };
            render(d);
        });
        renderGlobalHistory();
    });

    function openTab(evt, deptName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(deptName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function addTicket(dept, type) {
        const nextNum = window.currentCounters[dept][type];
        if (!localQueues[dept][type]) localQueues[dept][type] = [];
        localQueues[dept][type].push(nextNum);
        window.currentCounters[dept][type]++;
        db.ref('/').update({ queues: localQueues, counters: window.currentCounters });
    }

    function serve(dept, type, index) {
        const ticketNum = localQueues[dept][type][index];
        const table = document.getElementById(`table-${dept}`).value || "0";
        const history = window.currentHistory || [];
        const display = window.currentDisplay || {};

        if (display[dept]) {
            history.unshift({
                num: display[dept].num,
                type: display[dept].type,
                table: display[dept].table,
                dept: dept,
                timestamp: Date.now()
            });
        }

        display[dept] = { num: ticketNum, type: type, table: table };
        localQueues[dept][type].splice(index, 1);
        db.ref('/').update({ queue_display: display, queue_history: history, queues: localQueues });
    }

    function markDone(dept) {
        const display = window.currentDisplay || {};
        if (display[dept]) {
            delete display[dept];
            db.ref('queue_display').set(display);
        }
    }

    function markHistoryDone(ts) {
        const history = (window.currentHistory || []).filter(item => item.timestamp !== ts);
        db.ref('queue_history').set(history);
    }

    function render(dept) {
        const regList = document.getElementById(`list-${dept}-REGULAR`);
        const priList = document.getElementById(`list-${dept}-PRIORITY`);
        const nowEl = document.getElementById(`now-${dept}`);

        if (regList) {
            regList.innerHTML = (localQueues[dept].REGULAR || []).map((num, i) => `
                <div class="queue-row">
                    <h3># ${num} (REGULAR)</h3>
                    <button class="pill-btn serve-pill" onclick="serve('${dept}', 'REGULAR', ${i})">SERVE</button>
                </div>`).join('');
        }
        if (priList) {
            priList.innerHTML = (localQueues[dept].PRIORITY || []).map((num, i) => `
                <div class="queue-row">
                    <h3># ${num} (PRIORITY)</h3>
                    <button class="pill-btn serve-pill" onclick="serve('${dept}', 'PRIORITY', ${i})">SERVE</button>
                </div>`).join('');
        }

        const d = window.currentDisplay || {};
        // Restore ticket type in "Now Serving"
        if (nowEl) {
            if (d[dept]) {
                nowEl.innerText = `#${d[dept].num} (${d[dept].type})`;
            } else {
                nowEl.innerText = "NONE";
            }
        }
    }

    function renderGlobalHistory() {
        const histEl = document.getElementById('global-history-list');
        const h = window.currentHistory || [];
        if (h.length === 0) {
            histEl.innerHTML = '<div style="color:#aaa; font-size:12px; padding:10px;">No pending no-shows.</div>';
            return;
        }
        histEl.innerHTML = h.map(item => `
            <div class="history-row">
                <span style="font-size:14px; font-weight:900; color:var(--psa-blue)">#${item.num} (${item.type}) - ${item.dept}</span>
                <button class="pill-btn serve-pill" style="background:#4a5568" onclick="markHistoryDone(${item.timestamp})">DONE</button>
            </div>
        `).join('');
    }

    function resetQueue() { 
        if(confirm("Reset all? This will restart all counters from #1.")) {
            db.ref('/').remove(); 
            location.reload();
        }
    }

    function handleLogout() {
        if (confirm("Are you sure you want to log out?")) {
            localStorage.removeItem('psa_admin_session');
            window.location.href = "login.html";
        }
    }

    init();
</script>
</body>
</html>
